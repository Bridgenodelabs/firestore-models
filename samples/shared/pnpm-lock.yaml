lockfileVersion: '9.0'

settings:
  autoInstallPeers: true
  excludeLinksFromLockfile: false

importers:

  .:
    dependencies:
      '@bridgenodelabs/firestore-models':
        specifier: file:../..
        version: file:../..
    devDependencies:
      typescript:
        specifier: ^6.0.2
        version: 6.0.2

packages:

  '@bridgenodelabs/firestore-models@file:../..':
    resolution: {directory: ../.., type: directory}
    engines: {node: '>=22.0.0', pnpm: '>=9'}
    peerDependencies:
      firebase: '>=10.0.0'
      firebase-admin: '>=12.0.0'
      react: '>=18.0.0'
    peerDependenciesMeta:
      firebase:
        optional: true
      firebase-admin:
        optional: true
      react:
        optional: true

  typescript@6.0.2:
    resolution: {integrity: sha512-bGdAIrZ0wiGDo5l8c++HWtbaNCWTS4UTv7RaTH/ThVIgjkveJt83m74bBHMJkuCbslY8ixgLBVZJIOiQlQTjfQ==}
    engines: {node: '>=14.17'}
    hasBin: true

snapshots:

  '@bridgenodelabs/firestore-models@file:../..': {}

  typescript@6.0.2: {}
